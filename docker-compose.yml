services:
    web:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: 2026_php_exam_web
        depends_on:
            - mariadb
        ports:
            - 80:80 # 0 - 65535 from 0 to 1024 are reserved 1025 and above 655535
        volumes:
            - .:/var/www/html
        networks:
            - shared-network

    mariadb:
        image: mariadb:10.6.20
        container_name: 2026_php_exam_mariadb
        environment:
            MYSQL_ROOT_PASSWORD: password
            MYSQL_DATABASE: 2026_php_exam_db
        volumes:
            - mariadb_data:/var/lib/mysql
        ports:
            - 3301:3306

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: 2026_php_exam_phpmyadmin
        depends_on:
            - mariadb
        environment:
            PMA_HOST: mariadb
            MYSQL_ROOT_PASSWORD: password
        ports:
            - 8081:80
volumes:
    mariadb_data:

networks:
    shared-network:
        external: true
